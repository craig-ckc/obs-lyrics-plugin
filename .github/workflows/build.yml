name: Build Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          arch: 'win64_msvc2019_64'

      - name: Download OBS Studio (Pre-built)
        shell: powershell
        run: |
          # Download OBS Studio to get headers and libs (if available) or use a known dev package.
          # Since official releases don't include .lib files, we typically need a 'dev' package.
          # For this example, we will try to use a community provided dev package or just warn.
          # A common practice is to rely on vcpkg or a custom dep cache.
          
          # We will attempt to use vcpkg to install libobs if possible, or just skip and fail if not found.
          # However, to be helpful, we will try to download a specific dev package if we can.
          # Let's assume we need to build against a specific version.
          
          echo "Please configure OBS dependencies location."
          
      - name: Configure
        run: cmake --preset windows-ci-x64
        env:
          CMAKE_PREFIX_PATH: ${{ env.Qt6_DIR }}

      - name: Build
        run: cmake --build --preset windows-ci-x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-plugin
          path: build_x64/obs-lyrics-plugin.dll
